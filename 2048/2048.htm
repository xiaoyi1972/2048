<script type="text/javascript" src="jquery.js"></script>
<script>
var newI,newJ,N,ifchange=0;
var x=document.getElementById("a");
var score=0;

window.onload=function(){
init();
$('#score').css('left',$('#back').position().left+125);
$('#score').css('top',$('#back').position().top-$('#score').height()-250-20);
scoreUpdate();
};

function CreateNewItem(n){
var div=document.createElement("DIV");
div.id='div'+n;
document.body.appendChild(div);
document.getElementById("ge"+n).appendChild(div);
return div;
}

function SetStyle(div,i,j)
{
div.setAttribute('class','nItem'+map[i][j]);
var t=document.createTextNode(Math.pow(2,map[i][j]));
div.appendChild(t);
}

function scoreUpdate()
{
$('#score').text("·ÖĘý:"+score);
}

function scoreAdd(i,j)
{
return 5*map[i][j];
}

function if_full(){
//var x=document.getElementById("a");
var n=1;
for(var i=0;i<4;i++)
{
for(var j=0;j<4;j++)
{
if(map[i][j]==0)
{
n=0;
}
}
}
//x.innerHTML=n;
return n;
}

function if_fail(){
var n=1;
for(var i=0;i<4;i++)
{
 for(var j=0;j<4;j++)
 {
  if(map[i][j]>-1)
  {
  if(j<3&&(map[i][j]==map[i][j+1]||map[i][j+1]==0))
  n=0;
  else if(j>0&&(map[i][j]==map[i][j-1]||map[i][j-1]==0))
  n=0;
  else if(i>0&&(map[i][j]==map[i-1][j]||map[i-1][j]==0))
  n=0;
  else if(i<3&&(map[i][j]==map[i+1][j]||map[i+1][j]==0))
  n=0;
  }
 }
}
return n;
}


function rand_num(){
var num=Math.floor(Math.random()*3);
var i,j;

if(if_full())
{
//alert('GameOver');
return 0;
}

do
{
i=Math.floor(Math.random()*4);
j=Math.floor(Math.random()*4);
}while(map[i][j]!=0)
newI=i;
newJ=j;

if(num==0||num==1)
{
map[i][j]=1;
var div=CreateNewItem(j+i*4);
SetStyle(div,i,j);
//$("#div"+(j+i*4)).hide();
$("#div"+(j+i*4)).css('opacity',0);
//$('#div'+(j+i*4)).fadeIn('slow');
$("#div"+(j+i*4)).animate({opacity:'1'},'fast');
}
else
{
map[i][j]=2;
var div=CreateNewItem(j+i*4);
SetStyle(div,i,j);
//$("#div"+(j+i*4)).hide();
$("#div"+(j+i*4)).css('opacity',0);
//$('#div'+(j+i*4)).fadeIn('slow');
$("#div"+(j+i*4)).animate({opacity:'1'},'fast');
}
N=map[i][j];
}

function init(){
score=0;
for(var i1=0;i1<4;i1++)
{
	for(var j1=0;j1<4;j1++)
        map[i1][j1]=0;
}
var i,j,n=0;
do
{
i=Math.floor(Math.random()*4);
j=Math.floor(Math.random()*4);
if(map[i][j]==0)
{
map[i][j]=1;
var div=CreateNewItem(j+i*4);
SetStyle(div,i,j);
n++;
}
else continue;
}while(n!=2)
}


function ItemUpdate(){
$(".Ge").children("div").stop(false,true);
$(".Ge").children("div").remove();
		for(var i=0;i<4;i++)
		{
			for(var j=0;j<4;j++)
			{   
                if(map[i][j]!=0){           
		var div=CreateNewItem(j+i*4);SetStyle(div,i,j);}
			}
		}

}

	function left_hebing(){
        var new0=map[0].concat();
        var new1=map[1].concat();
        var new2=map[2].concat();
        var new3=map[3].concat();
	for(var i=0;i<4;i++)
	{
	  for(var j=0;j<4;j++)
	  {
		  if(j==3)
		  break;
		  if(map[i][j]==map[i][j+1]&&map[i][j]!=0)
		  {
                   score+=scoreAdd(i,j); 
		   map[i][j]++;
		   map[i][j+1]=0;
                           
                   $('#div'+((j+1)+i*4)).animate({left:'-='+125+'px'},'fast',function(){$(this).remove();
if(!$(".Ge").children("div").is(":animated")){ItemUpdate();if(!ifchange)
{rand_num();}}});
		  }
		  if(map[i][j]==0)
		  {
		   for(var k=j;map[i][k]==0;k++)
		   if(k==3)
		   break;
                   if(map[i][k]==0)
                   continue;
                   map[i][j]=map[i][k];
		   map[i][k]=0;            
                   $('#div'+((k)+i*4)).animate({left:'-='+(k-j)*125+'px'},'fast',function(){$(this).remove();
if(!$(".Ge").children("div").is(":animated")){ItemUpdate();if(!ifchange)
{rand_num();}}});
                   }
                  
		 
	  }
	 }
        if(new0.toString()==map[0].toString()&&new1.toString() == map[1].toString()&&new2.toString() == map[2].toString()&&new3.toString() == map[3].toString())
	return 1;
        //ItemUpdate();
        }
	
	function right_hebing(){
 var new0=map[0].concat();
        var new1=map[1].concat();
        var new2=map[2].concat();
        var new3=map[3].concat();
	for(var i=0;i<4;i++)
	{
	  for(var j=3;j>-1;j--)
	  {
		  if(j==0)
		  break;
		  if(map[i][j]==map[i][j-1]&&map[i][j]!=0)
		  {
score+=scoreAdd(i,j);
		   map[i][j]++;
		   map[i][j-1]=0;
$('#div'+((j-1)+i*4)).animate({left:'+='+125+'px'},'fast',function(){$(this).remove();
if(!$(".Ge").children("div").is(":animated")){ItemUpdate();if(!ifchange)
{rand_num();}}});
		  }
		  if(map[i][j]==0)
		  {
		   for(var k=j;map[i][k]==0;k--)
	           if(k==0)
                   break;
                   if(map[i][k]==0)
                   continue;
		   map[i][j]=map[i][k];
		   map[i][k]=0;
$('#div'+((k)+i*4)).animate({left:'+='+(j-k)*125+'px'},'fast',function(){$(this).remove();
if(!$(".Ge").children("div").is(":animated")){ItemUpdate();if(!ifchange)
{rand_num();}}});
		  }
		 
	  }
	 }
 if(new0.toString()==map[0].toString()&&new1.toString() == map[1].toString()&&new2.toString() == map[2].toString()&&new3.toString() == map[3].toString())
	return 1;
//ItemUpdate();
	}

function up_hebing(){

		  if(i==3)
		  break;
		  if(map[i][j]==map[i+1][j]&&map[i][j]!=0)
		  {
score+=scoreAdd(i,j);
		   map[i][j]++;
		   map[i+1][j]=0;
                   $('#div'+((j)+(i+1)*4)).animate({top:'-='+125+'px'},'fast',function(){$(this).remove();
if(!$(".Ge").children("div").is(":animated")){ItemUpdate();if(!ifchange)
{rand_num();}}});
		  }
		  if(map[i][j]==0)
		  {
		   for(var k=i;map[k][j]==0;k++)
		   if(k==3)

                   continue;
		   map[i][j]=map[k][j];
		   map[k][j]=0;
                   $('#div'+((j)+k*4)).animate({top:'-='+(k-i)*125+'px'},'fast',function(){$(this).remove();if(!$(".Ge").children("div").is(":animated")){ItemUpdate();if(!ifchange)
{rand_num();}}});
		  }
		 
	  }
	 }
 if(new0.toString()==map[0].toString()&&new1.toString() == map[1].toString()&&new2.toString() == map[2].toString()&&new3.toString() == map[3].toString())
	return 1;
//ItemUpdate();
	}
	
function down_hebing(){
 var new0=map[0].concat();
        var new1=map[1].concat();
        var new2=map[2].concat();
        var new3=map[3].concat();
	for(var j=0;j<4;j++)
	{
	  for(var i=3;i>-1;i--)
	  {
		  if(i==0)
		  break;
		  if(map[i][j]==map[i-1][j]&&map[i][j]!=0)
		  {
score+=scoreAdd(i,j);
		   map[i][j]++;
		   map[i-1][j]=0;
                   $('#div'+((j)+(i-1)*4)).animate({top:'+='+125+'px'},'fast',function(){$(this).remove();
if(!$(".Ge").children("div").is(":animated")){ItemUpdate();if(!ifchange)
{rand_num();}}});
		  }
		  if(map[i][j]==0)
		  {
		   for(var k=i;map[k][j]==0;k--)
	          if(k==0)
		   break;
                   if(map[k][j]==0)
                   continue;
		   map[i][j]=map[k][j];
		   map[k][j]=0;
                   $('#div'+((j)+k*4)).animate({top:'+='+(i-k)*125+'px'},'fast',function(){$(this).remove();if(!$(".Ge").children("div").is(":animated")){ItemUpdate();if(!ifchange)
{rand_num();}}});
		  }
		 
	  }
	 }
 if(new0.toString()==map[0].toString()&&new1.toString() == map[1].toString()&&new2.toString() == map[2].toString()&&new3.toString() == map[3].toString())
	return 1;
//ItemUpdate();
	}

var map=[0,0,0,0];
	map[0]=[1,1,0,0];
	map[1]=[5,6,0,0];
	map[2]=[9,2,0,0];
	map[3]=[1,0,0,0];

document.onkeydown=function(event){
var e = event || window.event || arguments.callee.caller.arguments[0];

ItemUpdate();
if(e && e.keyCode==13){ // °´ Enter 
//ŇŞ×öµÄĘÂÇé
        init();
        scoreUpdate();
        ItemUpdate();
}
if(e && e.keyCode==113){ // °´ F2 
//ŇŞ×öµÄĘÂÇé
} 

if(e && e.keyCode==37){ // ×ó Ľü
if(if_fail())
{
alert('GameOver');
return 0;
}
score+=2;
scoreUpdate();
ifchange=left_hebing();

//ŇŞ×öµÄĘÂÇé
}

{
alert('GameOver');

}

scoreUpdate();
ifchange=up_hebing();

}

{
alert('GameOver');
return 0;
}

}
